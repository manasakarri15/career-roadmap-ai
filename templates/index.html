<!DOCTYPE html>
<html>

<head>

    <title>Career Roadmap AI</title>

    <style>

    body{
        font-family: Arial;
        background: linear-gradient(to right,#141e30,#243b55);
        text-align:center;
        padding-top:100px;
        color:white;
    }

    .box{
        background:#1e293b;
        width:400px;
        margin:auto;
        padding:30px;
        border-radius:15px;
        box-shadow:0px 0px 20px rgba(0,0,0,0.5);
    }

    h1{
        color:#00d4ff;
    }

    input{
        width:90%;
        padding:12px;
        margin:10px;
        border:none;
        border-radius:8px;
        background:#334155;
        color:white;
        font-size:15px;
    }

    input::placeholder{
        color:#cbd5e1;
    }

    button{
        padding:12px 20px;
        background:#00d4ff;
        color:black;
        border:none;
        border-radius:8px;
        cursor:pointer;
        font-size:16px;
        font-weight:bold;
    }

    button:hover{
        background:#38bdf8;
        transform:scale(1.05);
        transition:0.3s;
    }

</style>

</head>

<body>

    <div class="box">

        <h1>Career Roadmap AI 🚀</h1>

        <form action="/generate" method="POST">

            <input type="text" name="skill" placeholder="Enter Your Skill" required>

            <br>

            <input type="text" name="goal" placeholder="Enter Career Goal" required>

            <br>

            <button type="submit">Generate AI Roadmap</button>

        </form>

    </div>

</body>

</html>
