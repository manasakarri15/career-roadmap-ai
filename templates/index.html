<!DOCTYPE html>
<html>

<head>

    <title>Career Roadmap AI</title>

    <style>

        body{
            font-family: Arial;
            background: linear-gradient(to right,#4facfe,#00f2fe);
            text-align:center;
            padding-top:100px;
        }

        .box{
            background:white;
            width:400px;
            margin:auto;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px;
        }

        button{
            padding:10px 20px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>Career Roadmap AI 🚀</h1>

        <form action="/generate" method="POST">

            <input type="text" name="skill" placeholder="Enter Your Skill" required>

            <br>

            <input type="text" name="goal" placeholder="Enter Career Goal" required>

            <br>

            <button type="submit">Generate AI Roadmap</button>

        </form>

    </div>

</body>

</html>
