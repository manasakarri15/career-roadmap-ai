<!DOCTYPE html>
<html>

<head>

    <title>Career Roadmap AI</title>

    <style>

        body{
            font-family: Arial;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #334155);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            text-align:center;
            padding-top:80px;
            color:white;
            overflow:hidden;
        }

        @keyframes gradientBG {
            0%{
                background-position:0% 50%;
            }
            50%{
                background-position:100% 50%;
            }
            100%{
                background-position:0% 50%;
            }
        }

        .box{
            background: rgba(30,41,59,0.8);
            width:420px;
            margin:auto;
            padding:35px;
            border-radius:20px;
            backdrop-filter: blur(10px);
            box-shadow:0px 0px 30px rgba(0,0,0,0.5);
            animation: fadeIn 1.2s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0px);
            }
        }

        h1{
            color:#38bdf8;
            margin-bottom:25px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow{
            from{
                text-shadow:0 0 10px #38bdf8;
            }
            to{
                text-shadow:0 0 25px #38bdf8;
            }
        }

        input{
            width:90%;
            padding:14px;
            margin:12px;
            border:none;
            border-radius:10px;
            background:#334155;
            color:white;
            font-size:15px;
            transition:0.3s;
        }

        input:focus{
            outline:none;
            transform:scale(1.03);
            box-shadow:0px 0px 15px #38bdf8;
        }

        input::placeholder{
            color:#cbd5e1;
        }

        button{
            padding:14px 24px;
            background:#38bdf8;
            color:black;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
            transition:0.3s;
        }

        button:hover{
            background:#0ea5e9;
            transform:scale(1.08);
            box-shadow:0px 0px 20px #38bdf8;
        }

        p{
            color:#cbd5e1;
            font-size:14px;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>Career Roadmap AI 🚀</h1>

        <p>Generate your personalized career roadmap instantly</p>

        <form action="/generate" method="POST">

            <input type="text" 
                   name="skill" 
                   placeholder="Enter Your Skill"
                   required>

            <br>

            <input type="text" 
                   name="goal" 
                   placeholder="Enter Career Goal"
                   required>

            <br><br>

            <button type="submit">
                Generate AI Roadmap
            </button>

        </form>

    </div>

</body>

</html>
